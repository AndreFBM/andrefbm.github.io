<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found | André Monteiro</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <style>
      :root {
        --ink: #151917;
        --paper: #f7f2e8;
        --teal: #0f766e;
        --teal-dark: #073f3b;
        --signal: #9fbb5b;
        --chalk: #f8fbf5;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100svh;
        background: var(--teal-dark);
        color: var(--chalk);
        display: grid;
        place-items: center;
        padding: 32px 16px;
        text-rendering: optimizeLegibility;
      }

      .wrap {
        max-width: 540px;
        text-align: center;
      }

      .brand-mark {
        width: 52px;
        height: 52px;
        display: inline-grid;
        place-items: center;
        border: 1px solid rgba(248, 251, 245, 0.4);
        border-radius: 50%;
        font-size: 0.82rem;
        font-weight: 820;
        margin-bottom: 36px;
        color: var(--chalk);
        letter-spacing: 0;
      }

      .code {
        margin: 0 0 12px;
        color: var(--signal);
        font-size: 0.8rem;
        font-weight: 820;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2rem, 6vw, 3.6rem);
        font-weight: 850;
        letter-spacing: 0;
        line-height: 1.05;
      }

      p {
        margin: 0 0 36px;
        color: rgba(248, 251, 245, 0.7);
        font-size: 1.1rem;
        line-height: 1.55;
      }

      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 13px 22px;
        border-radius: 6px;
        border: 1px solid rgba(248, 251, 245, 0.3);
        color: var(--chalk);
        background: rgba(248, 251, 245, 0.08);
        font-weight: 780;
        text-decoration: none;
        transition: transform 160ms ease, background 160ms ease;
      }

      a.button:hover,
      a.button:focus-visible {
        transform: translateY(-2px);
        background: rgba(248, 251, 245, 0.14);
      }

      :focus-visible {
        outline: 3px solid rgba(196, 123, 42, 0.62);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand-mark" aria-hidden="true">AM</div>
      <p class="code">404</p>
      <h1>Page not found</h1>
      <p>This page doesn't exist or has moved. Head back to the main site.</p>
      <a class="button" href="/">Back to André Monteiro</a>
    </div>
  </body>
</html>
